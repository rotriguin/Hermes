<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagem Enviada | Hermes</title>
    <!-- Redirecionamento Automático em 3 segundos -->
    <meta http-equiv="refresh" content="3;url=index.html">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f4f2;
            --primary: #f4c16c;
            --text-light: #222222;
            --text-gray: #555555;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .success-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(20, 38, 84, 0.08);
            /* Sombra baseada no brand (azul) */
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        h1 span {
            color: var(--primary);
        }

        p {
            color: var(--text-gray);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .loader {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .loader::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: var(--primary);
            animation: load 3s linear forwards;
        }

        @keyframes load {
            100% {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="success-container">
        <div class="icon">🚀</div>
        <h1>Mensagem <span>Enviada!</span></h1>
        <p>Recebemos o seu contato com sucesso. Você será redirecionado em instantes...</p>
        <div class="loader"></div>
    </div>
</body>

</html>
